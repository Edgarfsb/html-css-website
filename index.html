<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <header>
            <div class="header-logo">Header Logo</div>
            <nav class="header-links">
                <ul>
                    <li class="header-link-one">
                        <a href="">header link one</a>
                    </li>
                    <li class="header-link-two">
                        <a href="">header link two</a>
                    </li>
                    <li class="header-link-three">
                        <a href="">header link three</a>
                    </li>
                </ul>
            </nav>
    </header>
    <main>
        <section class="hero-element">
            <div class="hero-text">
                <h1 class="hero-title">This website is awesome</h1>
                <p class="hero-subtext">Subtext goes here</p>
                <!--Either a button that does nothing or a link to another page depending on what we decide to do, leaving it as a buttong for now-->
                <button type="button">Sign Up</button>
            </div>
            <picture class="hero-image">
                <!--Placeholder imgage for the hero element, replace it when we have a theme thought out-->
                <img src="./images/placeholder.png" alt="placeholder" title="placeholder" width="500" height="500">
            </picture>
        </section>
        <section class="infromation-element">
            <h2 class="information-title">Some random Information</h2>
            <ul>
                <li>
                    <figure class="information-image-one">
                        <img src="./images/placeholder.png" alt="placeholder" title="placeholder" width="200" height="200">
                        <figcaption>subtext under image</figcaption>
                    </figure>
                </li>
                <li>
                    <figure class="information-image-two">
                        <img src="./images/placeholder.png" alt="placeholder" title="placeholder" width="200" height="200">
                        <figcaption>subtext under image</figcaption>
                    </figure>
                </li>
                <li>
                    <figure class="information-image-three">
                        <img src="./images/placeholder.png" alt="placeholder" title="placeholder" width="200" height="200">
                        <figcaption>subtext under image</figcaption>
                    </figure>
                </li>
                <li>
                    <figure class="information-image-four">
                        <img src="./images/placeholder.png" alt="placeholder" title="placeholder" width="200" height="200">
                        <figcaption>subtext under image</figcaption>
                    </figure>
                </li>
            </ul>
        </section>
        <section class="quote-element">
            <p class="quote-text">
                random quote here
            </p>
            <p class="quote-author">
                author
            </p>
        </section>
        <section class="call-to-action-element">
            <div class="call-to-action-text">
                <h3 class="call-to-action-title">
                    Call to action. It's Time!
                </h3>
                <p class="call-to-action-subtext">
                    Sign up for our product clicking that button.
                </p>
            </div>
            <button type="button" class="call-to-action-button">Sign Up</button>
        </section>
    </main>
</body>
</html>
